<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <title>3D River Run: Pose Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #001a0d; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 8px rgba(0, 0, 0, 1); pointer-events: none; z-index: 10; }
        #warning { color: #ff4444; display: none; font-weight: bold; font-size: 2em; animation: blink 0.5s infinite; }
        #status { position: absolute; bottom: 10px; right: 10px; color: #0f0; font-size: 12px; z-index: 100; }
        
        /* 隱藏攝影機與偵測畫布，但保持運作 */
        #video_source, #output_canvas { display: none; }

        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="ui">
        <div style="font-size: 1.8em; font-weight: 800">距離: <span id="dist">0</span>m</div>
        <div style="font-size: 1.1em; color: #ffcc00">最高紀錄: <span id="best">0</span>m</div>
        <div id="stageInfo" style="color: #00ffcc">環境: 載入 AI 中...</div>
        <div id="warning">⚠️ 掠食者接近中 ⚠️</div>
        <div id="motion_debug" style="margin-top:10px; color: #ffeb3b;">偵測狀態: 等待中</div>
    </div>

    <div id="status">AI 模型初始化中...</div>

    <img id="video_source" src="http://localhost:3000/video_feed" crossorigin="anonymous">
    <canvas id="output_canvas"></canvas>

    <div id="game-over-screen" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.85); color: white; padding: 40px; border-radius: 20px; text-align: center; z-index: 1000; border: 2px solid #ff6600; min-width: 300px;">
      <h1 id="over-msg" style="color: #ff4444; margin-top: 0;">遊戲結束</h1>
      <p style="font-size: 1.5em;">本次距離: <span id="final-dist">0</span>m</p>
      <p id="countdown-text" style="font-size: 1.2em; color: #ffcc00; margin: 16px 0 0;">5 秒後將自動返回</p>
      <button onclick="location.reload()" style="background: #ff6600; color: white; border: none; padding: 10px 30px; font-size: 1.2em; border-radius: 5px; cursor: pointer; margin-top: 20px;">再試一次</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 骨架偵測變數 ---
        const img = document.getElementById('video_source');
        const motionDebug = document.getElementById('motion_debug');
        const statusTxt = document.getElementById('status');
        let detector;
        let motionControl = { left: false, right: false };

        // --- 遊戲變數 ---
        const SPEEDS = { UPSTREAM: 0.4, STREAM: 0.8, OCEAN: 1.0 };
        let scene, camera, renderer, player, shark, riverBed, banks;
        let obstacles = [];
        let distance = 0;
        let bestDistance = localStorage.getItem('fish_run_v4_best') || 0;
        let currentSpeed = SPEEDS.UPSTREAM;
        let gameActive = false; // 初始化為 false，等 AI 好了才開始
        let clock = new THREE.Clock();

        document.getElementById('best').innerText = bestDistance;

        // --- AI 骨架偵測初始化 ---
        async function initAI() {
            try {
                const model = poseDetection.SupportedModels.BlazePose;
                const detectorConfig = {
                    runtime: 'mediapipe',
                    solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/pose',
                    modelType: 'full'
                };
                detector = await poseDetection.createDetector(model, detectorConfig);
                statusTxt.innerText = "AI 運作中";
                document.getElementById('stageInfo').innerText = "環境: 山間溪流 (手勢已啟用)";
                gameActive = true;
                detectPose();
            } catch (e) {
                console.error(e);
                statusTxt.innerText = "AI 載入失敗";
                gameActive = true; // 失敗仍允許鍵盤操作
            }
        }

        async function detectPose() {
            if (detector && img.complete && img.naturalWidth !== 0) {
                const poses = await detector.estimatePoses(img);
                
                motionControl.left = false;
                motionControl.right = false;

                if (poses.length > 0) {
                    const kp = poses[0].keypoints;
                    const leftShoulder = kp[5];
                    const rightShoulder = kp[6];
                    const leftHip = kp[11];
                    const rightHip = kp[12];

                    if (leftShoulder.score > 0.5 && rightShoulder.score > 0.5) {
                        const shoulderCenterX = (leftShoulder.x + rightShoulder.x) / 2;
                        const hipCenterX = (leftHip.x + rightHip.x) / 2;
                        const diff = shoulderCenterX - hipCenterX;
                        const threshold = 25; // 靈敏度

                        if (diff < -threshold) {
                            motionControl.left = true;
                            motionDebug.innerText = "偵測狀態: ⬅️ 向左傾斜";
                        } else if (diff > threshold) {
                            motionControl.right = true;
                            motionDebug.innerText = "偵測狀態: ➡️ 向右傾斜";
                        } else {
                            motionDebug.innerText = "偵測狀態: 🟢 正常中心";
                        }
                    }
                }
            }
            requestAnimationFrame(detectPose);
        }

        // --- 3D 遊戲初始化 ---
        function initGame() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0a2a24, 0.015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 6, 15);
            camera.lookAt(0, 1, -5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 2);
            scene.add(hemiLight);
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(5, 15, 10);
            scene.add(sun);

            const terrainGroup = new THREE.Group();
            const floorGeo = new THREE.PlaneGeometry(40, 2000);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x142b26 });
            riverBed = new THREE.Mesh(floorGeo, floorMat);
            riverBed.rotation.x = -Math.PI / 2;
            riverBed.position.y = -4.5;
            terrainGroup.add(riverBed);

            const bankGeo = new THREE.PlaneGeometry(120, 2000);
            const bankMat = new THREE.MeshStandardMaterial({ color: 0x0d211a });
            const leftBank = new THREE.Mesh(bankGeo, bankMat);
            leftBank.rotation.x = -Math.PI / 2;
            leftBank.position.set(-80, -4.48, 0);
            terrainGroup.add(leftBank);

            const rightBank = leftBank.clone();
            rightBank.position.x = 80;
            terrainGroup.add(rightBank);

            banks = [leftBank, rightBank];
            scene.add(terrainGroup);

            createSlimGoldfish();
            createDetailedShark();

            

            // 支援鍵盤作為備份控制
            window.addEventListener('keydown', (e) => {
                if(e.code === 'ArrowLeft') motionControl.left = true;
                if(e.code === 'ArrowRight') motionControl.right = true;
            });
            window.addEventListener('keyup', (e) => {
                if(e.code === 'ArrowLeft') motionControl.left = false;
                if(e.code === 'ArrowRight') motionControl.right = false;
            });

            window.addEventListener('resize', onWindowResize);
            animate();
            initAI(); // 開始載入 AI
        }

        function createSlimGoldfish() {
            player = new THREE.Group();
            const bodyMat = new THREE.MeshPhongMaterial({ color: 0xff6600, shininess: 90 });
            const finMat = new THREE.MeshPhongMaterial({ color: 0xff9933, transparent: true, opacity: 0.8, side: THREE.DoubleSide });

            const body = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 16), bodyMat);
            body.scale.set(0.5, 0.7, 2.2);
            player.add(body);

            const eyeGeo = new THREE.SphereGeometry(0.18, 16, 16);
            const blackMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            [[-0.35, 0.2, -1.6], [0.35, 0.2, -1.6]].forEach((pos) => {
                const eye = new THREE.Mesh(eyeGeo, blackMat);
                eye.position.set(...pos);
                player.add(eye);
            });

            player.tailGroup = new THREE.Group();
            const tailShape = new THREE.Shape();
            tailShape.moveTo(0, 0); tailShape.lineTo(1.5, 1.2); tailShape.lineTo(1.5, -1.2); tailShape.lineTo(0, 0);
            const tailFin = new THREE.Mesh(new THREE.ShapeGeometry(tailShape), finMat);
            tailFin.rotation.y = Math.PI / 2;
            player.tailGroup.add(tailFin);
            player.tailGroup.position.z = 2.0;
            player.add(player.tailGroup);

            scene.add(player);
        }

        function createDetailedShark() {
            shark = new THREE.Group();
            const sMat = new THREE.MeshStandardMaterial({ color: 0x334455 });
            const sBody = new THREE.Mesh(new THREE.SphereGeometry(2, 32, 16), sMat);
            sBody.scale.set(0.8, 1, 4.5);
            shark.add(sBody);
            const sFin = new THREE.Mesh(new THREE.ConeGeometry(0.6, 2, 3), sMat);
            sFin.position.y = 1.6; sFin.rotation.x = 0.4;
            shark.add(sFin);
            shark.position.set(0, 0, 70);
            scene.add(shark);
        }

        function spawnRock() {
            const size = Math.random() * 2 + 0.8;
            const rock = new THREE.Mesh(new THREE.IcosahedronGeometry(size, 0), new THREE.MeshStandardMaterial({ color: 0x3d3d3d }));
            rock.position.set((Math.random() - 0.5) * 32, -3.5, -120);
            rock.hitRadius = size * 0.75;
            scene.add(rock);
            obstacles.push(rock);
        }

        function update() {
            if (!gameActive) return;
            const time = clock.getElapsedTime();

            // --- 動作輸入控制 ---
            if (motionControl.left && player.position.x > -15) {
                player.position.x -= 0.35;
                player.rotation.z = THREE.MathUtils.lerp(player.rotation.z, 0.5, 0.1);
            } else if (motionControl.right && player.position.x < 15) {
                player.position.x += 0.35;
                player.rotation.z = THREE.MathUtils.lerp(player.rotation.z, -0.5, 0.1);
            } else {
                player.rotation.z = THREE.MathUtils.lerp(player.rotation.z, 0, 0.1);
            }

            player.tailGroup.rotation.y = Math.sin(time * 12) * 0.4;
            player.position.y = Math.sin(time * 2.5) * 0.15;

            distance += currentSpeed * 0.5;
            document.getElementById('dist').innerText = Math.floor(distance);

            if (distance > 800) {
                currentSpeed = SPEEDS.OCEAN;
                document.getElementById('stageInfo').innerText = '環境: 開闊海洋';
                document.getElementById('warning').style.display = 'block';
                shark.position.z = THREE.MathUtils.lerp(shark.position.z, 6, 0.004);
                shark.position.x = THREE.MathUtils.lerp(shark.position.x, player.position.x, 0.015);
                if (shark.position.distanceTo(player.position) < 3.5) gameOver('被掠食者抓住了...');
            }

            if (Math.random() < 0.1) spawnRock();
            obstacles.forEach((rock, i) => {
                rock.position.z += currentSpeed * 1.5;
                const dx = player.position.x - rock.position.x;
                const dz = player.position.z - rock.position.z;
                if (Math.sqrt(dx*dx + dz*dz) < rock.hitRadius + 0.45) gameOver('撞到岩石了！');
                if (rock.position.z > 20) {
                    scene.remove(rock);
                    obstacles.splice(i, 1);
                }
            });
        }
        

        let gameOverCountdown = null;

        function gameOver(msg) {
          gameActive = false;
          const finalDist = Math.floor(distance);
          
          // 更新最高紀錄
          if (finalDist > bestDistance) {
              localStorage.setItem('fish_run_v4_best', finalDist);
          }

          // 顯示自定義結束畫面
          const screen = document.getElementById('game-over-screen');
          const msgElement = document.getElementById('over-msg');
          const distElement = document.getElementById('final-dist');
          const countdownText = document.getElementById('countdown-text');

          msgElement.innerText = msg;
          distElement.innerText = finalDist;
          screen.style.display = 'block';

          // 5 秒倒數後跳轉
          let countdown = 5;
          countdownText.innerText = `${countdown} 秒後將自動返回`;
          if (gameOverCountdown) {
              clearInterval(gameOverCountdown);
          }
          gameOverCountdown = setInterval(() => {
              countdown -= 1;
              if (countdown > 0) {
                  countdownText.innerText = `${countdown} 秒後將自動返回`;
              } else {
                  clearInterval(gameOverCountdown);
                  countdownText.innerText = '正在跳轉...';
                  location.href = './index.html';
              }
          }, 1000);

          // 停止 AI 偵測循環（可選，節省效能）
          detector = null; 
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        initGame();
    </script>
    
</body>
</html>
